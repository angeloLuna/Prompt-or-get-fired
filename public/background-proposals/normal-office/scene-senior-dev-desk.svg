<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%">
  <defs>
    <!-- Wall gradient (Late evening office look) -->
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b2330" />
      <stop offset="100%" stop-color="#0f141d" />
    </linearGradient>
    <!-- Carpet floor gradient -->
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <!-- Lamp Warm Light Cone -->
    <linearGradient id="lightCone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0.0" />
    </linearGradient>
    <!-- Monitor Screen Glow -->
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.0" />
    </linearGradient>
    <!-- Drop Shadow -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Wall -->
  <rect width="1440" height="580" fill="url(#wallGrad)" />

  <!-- Baseboard -->
  <rect y="565" width="1440" height="15" fill="#1b2330" />

  <!-- Floor (Dark Tech Carpet) -->
  <rect y="580" width="1440" height="320" fill="url(#floorGrad)" />
  <path d="M 0 680 L 1440 680 M 0 790 L 1440 790" stroke="#1b2330" stroke-width="2" />
  <line x1="200" y1="580" x2="50" y2="900" stroke="#1b2330" stroke-width="2" />
  <line x1="720" y1="580" x2="680" y2="900" stroke="#1b2330" stroke-width="2" />
  <line x1="1200" y1="580" x2="1300" y2="900" stroke="#1b2330" stroke-width="2" />

  <!-- WHITEBOARD (Right Wall - Architecture Diagram) -->
  <g transform="translate(1000, 70)" filter="url(#dropShadow)">
    <rect x="-6" y="-6" width="372" height="252" rx="6" fill="#475569" />
    <rect width="360" height="240" rx="3" fill="#ffffff" />
    
    <!-- Title -->
    <text x="15" y="25" font-family="monospace" font-size="11" font-weight="bold" fill="#334155">SYSTEM ARCHITECTURE (PROD)</text>
    <line x1="15" y1="35" x2="345" y2="35" stroke="#cbd5e1" stroke-width="1.5" />

    <!-- Boxes -->
    <!-- API GW -->
    <rect x="25" y="70" width="80" height="35" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" />
    <text x="35" y="92" font-family="monospace" font-size="9" font-weight="bold" fill="#1d4ed8">API Gateway</text>

    <!-- LLM Router -->
    <rect x="140" y="70" width="90" height="35" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
    <text x="150" y="92" font-family="monospace" font-size="9" font-weight="bold" fill="#15803d">LLM Router</text>

    <!-- Vector DB -->
    <rect x="260" y="70" width="80" height="35" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" />
    <text x="270" y="92" font-family="monospace" font-size="9" font-weight="bold" fill="#6d28d9">Vector DB</text>

    <!-- Cache -->
    <rect x="140" y="145" width="90" height="35" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1.5" />
    <text x="155" y="167" font-family="monospace" font-size="9" font-weight="bold" fill="#b45309">Redis Cache</text>

    <!-- Connections -->
    <path d="M 105 88 L 140 88" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="2,2" />
    <path d="M 230 88 L 260 88" fill="none" stroke="#64748b" stroke-width="1.5" />
    <path d="M 185 105 L 185 145" fill="none" stroke="#64748b" stroke-width="1.5" />
    <path d="M 230 162 L 300 162 L 300 105" fill="none" stroke="#64748b" stroke-width="1.5" />

    <!-- Eraser tray -->
    <rect x="120" y="235" width="40" height="3" fill="#94a3b8" />
  </g>

  <!-- L-SHAPE DEV DESK (Left Side) -->
  <g transform="translate(60, 480)" filter="url(#dropShadow)">
    <!-- Desk surface base board -->
    <path d="M -100 80 L 680 80 L 680 50 L -100 50 Z" fill="#2d3748" />
    <!-- Thickness -->
    <path d="M -100 80 L 680 80 L 680 95 L -100 95 Z" fill="#1a202c" />
    <!-- Sturdy metal desk legs -->
    <rect x="20" y="95" width="24" height="230" fill="#475569" />
    <rect x="620" y="95" width="24" height="230" fill="#475569" />
    
    <!-- Keyboard -->
    <polygon points="260,35 380,35 390,52 250,52" fill="#1e293b" stroke="#475569" stroke-width="1" />
    <!-- Mouse on mousepad -->
    <rect x="410" y="38" width="40" height="15" rx="3" fill="#0f172a" />
    <circle cx="430" cy="45" r="4" fill="#334155" />

    <!-- DUAL WIDESCREEN MONITORS -->
    <!-- Monitor 1 (Left - Code) -->
    <g transform="translate(20, -160)">
      <!-- Monitor Stand -->
      <rect x="110" y="140" width="20" height="85" fill="#475569" />
      <polygon points="80,225 160,225 180,240 60,240" fill="#334155" />
      <!-- Bezel Frame -->
      <rect x="0" y="0" width="240" height="150" rx="8" fill="#0f172a" stroke="#334155" stroke-width="2" />
      <!-- Screen display (Code IDE) -->
      <rect x="6" y="6" width="228" height="138" rx="3" fill="#090d16" />
      <!-- Highlight lines of mockup code -->
      <rect x="15" y="15" width="50" height="8" rx="1" fill="#ec4899" opacity="0.8" />
      <rect x="70" y="15" width="90" height="8" rx="1" fill="#3b82f6" opacity="0.8" />
      <rect x="30" y="30" width="110" height="6" rx="1" fill="#e2e8f0" opacity="0.6" />
      <rect x="30" y="42" width="140" height="6" rx="1" fill="#10b981" opacity="0.8" />
      <rect x="45" y="54" width="80" height="6" rx="1" fill="#f59e0b" opacity="0.8" />
      <rect x="45" y="66" width="115" height="6" rx="1" fill="#3b82f6" opacity="0.8" />
      <rect x="30" y="78" width="50" height="6" rx="1" fill="#ec4899" opacity="0.8" />
      <!-- Left side code tree explorer representation -->
      <line x1="12" y1="15" x2="12" y2="120" stroke="#1e293b" stroke-width="2" />
    </g>

    <!-- Monitor 2 (Right - System dashboard) -->
    <g transform="translate(290, -170)">
      <!-- Monitor Stand (slightly angled) -->
      <rect x="110" y="150" width="20" height="85" fill="#475569" />
      <polygon points="80,235 160,235 180,248 60,248" fill="#334155" />
      <!-- Bezel Frame -->
      <rect x="0" y="0" width="240" height="150" rx="8" fill="#0f172a" stroke="#334155" stroke-width="2" />
      <!-- Screen display -->
      <rect x="6" y="6" width="228" height="138" rx="3" fill="#090d16" />
      <!-- Grid charts -->
      <rect x="15" y="15" width="90" height="50" rx="4" fill="#1e293b" />
      <path d="M 20 55 L 40 45 L 60 30 L 80 48 L 100 25" fill="none" stroke="#06b6d4" stroke-width="2" />
      <rect x="120" y="15" width="90" height="50" rx="4" fill="#1e293b" />
      <ellipse cx="165" cy="40" rx="20" ry="20" fill="none" stroke="#f43f5e" stroke-width="4" stroke-dasharray="10, 20" />
      <text x="160" y="43" font-family="sans-serif" font-size="8" fill="#e2e8f0">82%</text>
      <!-- Bottom log terminal mockup -->
      <rect x="15" y="75" width="195" height="45" rx="3" fill="#020617" />
      <text x="22" y="90" font-family="monospace" font-size="6" fill="#10b981">> DEV_MODEL_EVAL: SUCCESS</text>
      <text x="22" y="100" font-family="monospace" font-size="6" fill="#64748b">> temp=0.2 tokens/sec=85.4</text>
      <text x="22" y="110" font-family="monospace" font-size="6" fill="#3b82f6">> listening on websocket...</text>
    </g>

    <!-- COFFEE MUG (On Desk) -->
    <g transform="translate(560, 42)">
      <rect x="0" y="0" width="18" height="24" rx="4" fill="#0284c7" />
      <ellipse cx="9" cy="0" rx="9" ry="2.5" fill="#fbe5d6" />
      <path d="M 18 5 Q 23 5 23 12 Q 23 19 18 19" fill="none" stroke="#0284c7" stroke-width="2.5" />
      <!-- Steam -->
      <path d="M 6 -8 Q 10 -15 6 -22" fill="none" stroke="#bae6fd" stroke-width="1.5" opacity="0.6" />
    </g>

    <!-- ANGLE DESK LAMP (Right Side of Desk, illuminating table) -->
    <g transform="translate(620, -50)">
      <!-- Base -->
      <rect x="-10" y="90" width="30" height="10" rx="3" fill="#e2e8f0" />
      <!-- Arm -->
      <path d="M 5 90 L -15 30 L 15 -30" fill="none" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round" />
      <!-- Joint connector -->
      <circle cx="-15" cy="30" r="6" fill="#94a3b8" />
      <!-- Shade head -->
      <polygon points="0,-45 40,-20 15,-10 -5,-35" fill="#e2e8f0" />
      <!-- Bulb light reflection source -->
      <polygon points="12,-12 38,-22 180,100 -20,100" fill="url(#lightCone)" />
    </g>
  </g>

  <!-- ERGONOMIC WORK CHAIR (Centered slightly to the left behind desk) -->
  <g transform="translate(240, 520)" filter="url(#dropShadow)">
    <ellipse cx="80" cy="225" rx="65" ry="12" fill="rgba(0, 0, 0, 0.12)" />
    <!-- Base wheels mechanism -->
    <path d="M 80 170 L 30 220 M 80 170 L 130 220 M 80 170 L 80 228" stroke="#475569" stroke-width="6" stroke-linecap="round" />
    <circle cx="30" cy="223" r="6" fill="#0f172a" />
    <circle cx="130" cy="223" r="6" fill="#0f172a" />
    <circle cx="80" cy="231" r="6" fill="#0f172a" />
    <rect x="74" y="120" width="12" height="60" fill="#475569" />

    <!-- Mesh Backrest -->
    <rect x="35" y="20" width="90" height="100" rx="15" fill="#1e293b" stroke="#475569" stroke-width="4" />
    <!-- Inner mesh texture horizontal lines -->
    <line x1="45" y1="40" x2="115" y2="40" stroke="#334155" stroke-width="2" />
    <line x1="45" y1="60" x2="115" y2="60" stroke="#334155" stroke-width="2" />
    <line x1="45" y1="80" x2="115" y2="80" stroke="#334155" stroke-width="2" />
    <line x1="45" y1="100" x2="115" y2="100" stroke="#334155" stroke-width="2" />
    
    <!-- Seat Cushion -->
    <rect x="25" y="110" width="110" height="25" rx="8" fill="#0f172a" stroke="#334155" stroke-width="2" />
  </g>
</svg>
