<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%">
  <defs>
    <!-- Wall gradient -->
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f3f0" />
      <stop offset="100%" stop-color="#e8e5e0" />
    </linearGradient>
    <!-- Floor gradient (Carpet tile style) -->
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <!-- Wood table gradient -->
    <linearGradient id="woodTableGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#c2410c" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Wall -->
  <rect width="1440" height="580" fill="url(#wallGrad)" />

  <!-- Baseboard -->
  <rect y="565" width="1440" height="15" fill="#94a3b8" />

  <!-- Floor (Carpeted Office) -->
  <rect y="580" width="1440" height="320" fill="url(#floorGrad)" />
  <!-- Carpet line grids for perspective -->
  <path d="M 0 680 L 1440 680 M 0 780 L 1440 780" stroke="#8093a6" stroke-width="1.5" />
  <line x1="300" y1="580" x2="100" y2="900" stroke="#8093a6" stroke-width="1.5" />
  <line x1="720" y1="580" x2="680" y2="900" stroke="#8093a6" stroke-width="1.5" />
  <line x1="1140" y1="580" x2="1200" y2="900" stroke="#8093a6" stroke-width="1.5" />

  <!-- GLASS PARTITION (Far Background, Left Side) -->
  <g transform="translate(60, 40)" opacity="0.8">
    <rect width="240" height="525" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="4" />
    <!-- Glass sheen reflections -->
    <path d="M 10 10 L 120 515 M 100 10 L 220 515" stroke="#ffffff" stroke-width="12" opacity="0.3" stroke-linecap="round" />
    <!-- Silhouette of office hallway plant -->
    <path d="M 80 400 Q 50 350 70 320 T 110 300 L 110 520 Z" fill="#94a3b8" opacity="0.3" />
    <path d="M 140 420 Q 180 370 160 340 T 130 310 L 130 520 Z" fill="#94a3b8" opacity="0.3" />
  </g>

  <!-- WHITEBOARD KANBAN BOARD (Right Wall) -->
  <g transform="translate(860, 80)" filter="url(#dropShadow)">
    <!-- Silver Frame -->
    <rect x="-8" y="-8" width="506" height="306" rx="8" fill="#d1d5db" />
    <rect width="490" height="290" rx="4" fill="#ffffff" />

    <!-- Title -->
    <text x="20" y="30" font-family="sans-serif" font-size="14" font-weight="bold" fill="#374151">PROJECT SPRINT BOARD</text>
    
    <!-- Columns -->
    <line x1="20" y1="50" x2="470" y2="50" stroke="#e5e7eb" stroke-width="2" />
    
    <!-- Columns dividers -->
    <line x1="170" y1="50" x2="170" y2="280" stroke="#f3f4f6" stroke-width="2" />
    <line x1="320" y1="50" x2="320" y2="280" stroke="#f3f4f6" stroke-width="2" />
    
    <!-- Column headers -->
    <text x="25" y="68" font-family="sans-serif" font-size="10" font-weight="bold" fill="#9ca3af">TO DO</text>
    <text x="180" y="68" font-family="sans-serif" font-size="10" font-weight="bold" fill="#f59e0b">IN PROGRESS</text>
    <text x="335" y="68" font-family="sans-serif" font-size="10" font-weight="bold" fill="#10b981">DONE</text>

    <!-- Kanban Cards (Post-its) -->
    <!-- TO DO column -->
    <rect x="25" y="85" width="60" height="40" rx="3" fill="#bae6fd" transform="rotate(-2, 55, 105)" />
    <line x1="30" y1="95" x2="70" y2="95" stroke="#0284c7" stroke-width="2" transform="rotate(-2, 55, 105)" />
    <line x1="30" y1="105" x2="60" y2="105" stroke="#0284c7" stroke-width="2" transform="rotate(-2, 55, 105)" />

    <rect x="90" y="90" width="60" height="40" rx="3" fill="#fef08a" transform="rotate(3, 120, 110)" />
    <line x1="95" y1="100" x2="140" y2="100" stroke="#ca8a04" stroke-width="2" transform="rotate(3, 120, 110)" />
    <line x1="95" y1="110" x2="125" y2="110" stroke="#ca8a04" stroke-width="2" transform="rotate(3, 120, 110)" />

    <rect x="25" y="145" width="60" height="40" rx="3" fill="#fbcfe8" transform="rotate(1, 55, 165)" />
    <line x1="30" y1="155" x2="75" y2="155" stroke="#db2777" stroke-width="2" transform="rotate(1, 55, 165)" />

    <!-- IN PROGRESS column -->
    <rect x="180" y="85" width="65" height="45" rx="3" fill="#fef08a" transform="rotate(4, 212, 107)" />
    <text x="185" y="103" font-family="sans-serif" font-size="8" fill="#ca8a04" font-weight="bold" transform="rotate(4, 212, 107)">PROMPTS!</text>
    <line x1="185" y1="112" x2="235" y2="112" stroke="#ca8a04" stroke-width="1.5" transform="rotate(4, 212, 107)" />

    <rect x="245" y="100" width="60" height="40" rx="3" fill="#bae6fd" transform="rotate(-3, 275, 120)" />
    <text x="249" y="115" font-family="sans-serif" font-size="8" fill="#0284c7" font-weight="bold" transform="rotate(-3, 275, 120)">STAGING</text>

    <!-- DONE column -->
    <rect x="335" y="85" width="60" height="40" rx="3" fill="#bbf7d0" transform="rotate(-1, 365, 105)" />
    <line x1="340" y1="95" x2="380" y2="95" stroke="#166534" stroke-width="2" transform="rotate(-1, 365, 105)" />
    <line x1="340" y1="105" x2="370" y2="105" stroke="#166534" stroke-width="2" transform="rotate(-1, 365, 105)" />

    <rect x="405" y="90" width="60" height="40" rx="3" fill="#bbf7d0" transform="rotate(3, 435, 110)" />
    <text x="409" y="108" font-family="sans-serif" font-size="8" fill="#166534" font-weight="bold" transform="rotate(3, 435, 110)">UI DESIGN</text>
    
    <!-- Red Marker drawn line (Drawn arrows or chart) -->
    <path d="M 120 180 Q 200 240 380 180" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="4,4" />
    <path d="M 380 180 L 365 173 M 380 180 L 370 192" fill="none" stroke="#ef4444" stroke-width="3" />
    <text x="210" y="235" font-family="sans-serif" font-size="9" fill="#ef4444" font-weight="bold">NEXT RELEASE 🚀</text>

    <!-- Eraser & Markers tray at bottom -->
    <rect x="180" y="284" width="70" height="4" fill="#9ca3af" />
    <rect x="260" y="284" width="30" height="5" fill="#1e293b" />
  </g>

  <!-- WALL CLOCK -->
  <g transform="translate(680, 80)">
    <circle cx="0" cy="0" r="35" fill="#f8fafc" stroke="#cbd5e1" stroke-width="4" filter="url(#dropShadow)" />
    <!-- Clock marks -->
    <line x1="0" y1="-28" x2="0" y2="-24" stroke="#475569" stroke-width="2" />
    <line x1="0" y1="24" x2="0" y2="28" stroke="#475569" stroke-width="2" />
    <line x1="-28" y1="0" x2="-24" y2="0" stroke="#475569" stroke-width="2" />
    <line x1="24" y1="0" x2="28" y2="0" stroke="#475569" stroke-width="2" />
    <!-- Hands (Time: 11:55) -->
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round" /> <!-- Hour hand -->
    <line x1="0" y1="0" x2="-16" y2="-12" stroke="#475569" stroke-width="2.5" stroke-linecap="round" /> <!-- Minute hand -->
    <circle cx="0" cy="0" r="3" fill="#ef4444" />
  </g>

  <!-- CONFERENCE TABLE (Left Side, extends into center slightly) -->
  <g transform="translate(-100, 520)" filter="url(#dropShadow)">
    <!-- Shadows on floor -->
    <ellipse cx="360" cy="220" rx="300" ry="25" fill="rgba(0, 0, 0, 0.08)" />

    <!-- Table Base Legs (Steel cylinders) -->
    <rect x="160" y="100" width="30" height="150" fill="#475569" />
    <ellipse cx="175" cy="250" rx="40" ry="10" fill="#334155" />
    
    <rect x="420" y="100" width="30" height="150" fill="#475569" />
    <ellipse cx="435" cy="250" rx="40" ry="10" fill="#334155" />

    <!-- Wood Board Top -->
    <ellipse cx="300" cy="100" rx="350" ry="50" fill="url(#woodTableGrad)" />
    <!-- Thickness -->
    <path d="M -50 100 A 350 50 0 0 0 650 100 L 650 115 A 350 50 0 0 1 -50 115 Z" fill="#9a3412" />
    
    <!-- Table top reflections -->
    <ellipse cx="300" cy="94" rx="320" ry="40" fill="none" stroke="#fdba74" stroke-width="2.5" opacity="0.35" />

    <!-- ORANGE COFFEE MUG -->
    <g transform="translate(380, 60)">
      <rect x="0" y="0" width="16" height="22" rx="3" fill="#f97316" />
      <ellipse cx="8" cy="0" rx="8" ry="2" fill="#ffedd5" />
      <!-- Mug Handle -->
      <path d="M 0 5 Q -6 5 -6 11 Q -6 17 0 17" fill="none" stroke="#f97316" stroke-width="2.5" />
      <!-- Steam -->
      <path d="M 6 -8 Q 10 -15 6 -22" fill="none" stroke="#ffddd5" stroke-width="1.5" opacity="0.7" />
    </g>

    <!-- CLOSED LAPTOP (On Table) -->
    <g transform="translate(220, 62)">
      <polygon points="0,15 60,5 110,18 50,30" fill="#cbd5e1" />
      <polygon points="50,30 110,18 110,22 50,34" fill="#94a3b8" />
      <polygon points="0,15 50,30 50,34 0,19" fill="#64748b" />
    </g>
  </g>

  <!-- OFFICE CHAIRS (Conference room chairs on left) -->
  <g transform="translate(180, 500)" filter="url(#dropShadow)">
    <!-- Chair 1 (Rear slightly) -->
    <g transform="scale(0.85) translate(40, -40)">
      <!-- Legs -->
      <line x1="60" y1="150" x2="20" y2="210" stroke="#475569" stroke-width="5" stroke-linecap="round" />
      <line x1="60" y1="150" x2="100" y2="210" stroke="#475569" stroke-width="5" stroke-linecap="round" />
      <!-- Shell (Grey/blue corporate chair) -->
      <path d="M 10 50 C 10 10, 110 10, 110 50 C 110 90, 120 150, 100 150 C 80 150, 80 110, 60 110 C 40 110, 40 150, 20 150 C 0 150, 10 90, 10 50 Z" fill="#334155" />
      <path d="M 20 60 C 20 25, 100 25, 100 60 L 90 105 H 30 Z" fill="#475569" />
    </g>
  </g>

</svg>
