<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="internBananaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="50%" stop-color="#fde047" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
    <linearGradient id="strapGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>

  <!-- Legs (Chubby and short) -->
  <g id="legs">
    <!-- Left Leg -->
    <path d="M 222 385 L 214 455" fill="none" stroke="#78350f" strokeWidth="12" strokeLinecap="round" />
    <path d="M 194 455 C 194 440, 222 440, 222 455 Z" fill="#0f172a" stroke="#ca8a04" strokeWidth="1.5" />

    <!-- Right Leg -->
    <path d="M 268 380 L 276 455" fill="none" stroke="#78350f" strokeWidth="12" strokeLinecap="round" />
    <path d="M 256 455 C 256 440, 284 440, 284 455 Z" fill="#0f172a" stroke="#ca8a04" strokeWidth="1.5" />
  </g>

  <!-- Backpack behind the body -->
  <g id="backpack-back">
    <rect x="180" y="240" width="110" height="90" rx="15" fill="#be185d" stroke="#9d174d" strokeWidth="4" />
    <rect x="200" y="225" width="70" height="20" rx="4" fill="#9d174d" />
  </g>

  <!-- Banana Body (Smaller, rounder, junior proportions) -->
  <g id="banana-body">
    <!-- Slightly shorter, stubbier curved banana path -->
    <path d="M 270 100 C 235 140, 202 200, 207 300 C 212 360, 235 395, 270 395 C 290 395, 285 340, 277 290 C 269 200, 285 150, 300 100 Z" fill="url(#internBananaGrad)" />
    <path d="M 270 100 C 235 140, 202 200, 207 300 C 212 360, 235 395, 270 395 C 270 395, 270 395, 270 395 Z" fill="#ca8a04" opacity="0.22" />

    <!-- Stem -->
    <path d="M 270 100 L 300 100 L 290 70 L 273 75 Z" fill="#78350f" />
    <path d="M 273 75 L 290 70 L 287 62 L 275 64 Z" fill="#451a03" />

    <!-- Bottom Tip -->
    <path d="M 263 393 C 269 396, 273 394, 275 390 C 270 384, 260 386, 258 391 Z" fill="#78350f" stroke="#78350f" strokeWidth="3" />
  </g>

  <!-- Backpack straps (on the shoulders of the banana) -->
  <g id="backpack-straps">
    <!-- Left strap -->
    <path d="M 213 220 Q 200 250 214 285" fill="none" stroke="url(#strapGrad)" strokeWidth="7" strokeLinecap="round" />
    <!-- Right strap -->
    <path d="M 278 220 Q 288 250 274 285" fill="none" stroke="url(#strapGrad)" strokeWidth="7" strokeLinecap="round" />
  </g>

  <!-- Nervous Face (Wide eyes, sweat drop, worried smile) -->
  <g id="face" transform="translate(10, 15)">
    <!-- Rosy Cheek (Nervous blush) -->
    <ellipse cx="214" cy="226" rx="9" ry="5" fill="#f43f5e" opacity="0.5" />
    <ellipse cx="272" cy="224" rx="9" ry="5" fill="#f43f5e" opacity="0.5" />

    <!-- Big Worried Eyes (Wide open pupils) -->
    <!-- Left Eye -->
    <circle cx="216" cy="208" r="13" fill="#0f172a" />
    <circle cx="213" cy="204" r="5" fill="#ffffff" />
    <!-- Right Eye -->
    <circle cx="270" cy="206" r="13" fill="#0f172a" />
    <circle cx="267" cy="202" r="5" fill="#ffffff" />

    <!-- High Worried Eyebrows -->
    <path d="M 200 188 Q 216 178 228 190" fill="none" stroke="#78350f" strokeWidth="2.5" strokeLinecap="round" />
    <path d="M 258 186 Q 274 176 286 188" fill="none" stroke="#78350f" strokeWidth="2.5" strokeLinecap="round" />

    <!-- Small wobbly nervous smile -->
    <path d="M 230 234 Q 242 224 254 233" fill="none" stroke="#0f172a" strokeWidth="4" strokeLinecap="round" />
    <path d="M 227 232 L 233 235" fill="none" stroke="#0f172a" strokeWidth="3" strokeLinecap="round" />

    <!-- Sweat drop (near left brow) -->
    <path d="M 194 190 C 190 190, 186 195, 186 200 C 186 205, 194 212, 194 212 C 194 212, 202 205, 202 200 C 202 195, 198 190, 194 190 Z" fill="#60a5fa" stroke="#2563eb" strokeWidth="1" />
  </g>

  <!-- Giant Intern / Visitor Lanyard Badge -->
  <g id="lanyard" transform="translate(10, 10)">
    <!-- Loop -->
    <path d="M 215 260 Q 242 300 270 258" fill="none" stroke="#be185d" strokeWidth="4.5" />
    <!-- Giant card holder (Visually oversized to look junior/intern) -->
    <rect x="224" y="285" width="38" height="50" rx="4" fill="#0f172a" stroke="#fbbf24" strokeWidth="2" />
    <!-- Top clip -->
    <rect x="238" y="280" width="10" height="7" fill="#64748b" />
    <!-- Photo -->
    <rect x="229" y="291" width="12" height="15" fill="#fef08a" />
    <!-- Lines -->
    <line x1="244" y1="294" x2="256" y2="294" stroke="#ffffff" strokeWidth="2" />
    <line x1="244" y1="300" x2="253" y2="300" stroke="#ffffff" strokeWidth="2" strokeOpacity="0.5" />
    <!-- Yellow Intern Badge Bar -->
    <rect x="228" y="312" width="30" height="18" fill="#fbbf24" rx="2" />
    <text x="243" y="325" fill="#090d16" fontSize="7" fontWeight="extrabold" fontFamily="monospace" text-anchor="middle">INTERN</text>
  </g>

  <!-- Right Arm holding Notebook -->
  <g id="arm-notebook">
    <!-- Arm -->
    <path d="M 276 235 Q 315 250 315 285" fill="none" stroke="#d97706" strokeWidth="12" strokeLinecap="round" />
    <!-- Hand -->
    <circle cx="315" cy="286" r="10" fill="#fde047" stroke="#ca8a04" strokeWidth="1.5" />

    <!-- Notebook -->
    <g id="notebook" transform="translate(306, 266) rotate(10)">
      <!-- Cover -->
      <rect x="0" y="0" width="28" height="38" rx="2" fill="#0284c7" stroke="#0369a1" strokeWidth="1.5" />
      <!-- Spiral spine (Left side dots) -->
      <circle cx="2" cy="6" r="2.5" fill="#94a3b8" />
      <circle cx="2" cy="14" r="2.5" fill="#94a3b8" />
      <circle cx="2" cy="22" r="2.5" fill="#94a3b8" />
      <circle cx="2" cy="30" r="2.5" fill="#94a3b8" />
    </g>
  </g>

  <!-- Left Arm (Hanging nervously) -->
  <g id="left-arm">
    <path d="M 205 240 Q 185 270 190 310" fill="none" stroke="#d97706" strokeWidth="12" strokeLinecap="round" />
  </g>
</svg>
