<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="ceoBananaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="40%" stop-color="#fbbf24" />
      <stop offset="85%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#92400e" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
    <linearGradient id="blazerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <!-- Blur filter for golden glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Golden Outline Glow behind the body -->
  <path d="M 270 45 C 235 95, 200 175, 205 290 C 210 365, 235 415, 275 415 C 298 415, 292 355, 282 295 C 272 205, 290 115, 305 45 Z" fill="none" stroke="#fcd34d" strokeWidth="15" opacity="0.35" filter="url(#glow)" />

  <!-- Legs and Shoes -->
  <g id="legs">
    <!-- Left Leg (Straight, formal) -->
    <path d="M 222 400 L 218 475" fill="none" stroke="#78350f" strokeWidth="12" strokeLinecap="round" />
    <path d="M 195 475 C 195 458, 225 458, 225 475 Z" fill="#020617" stroke="#1e293b" strokeWidth="2" />

    <!-- Right Leg (Straight, formal) -->
    <path d="M 270 395 L 274 475" fill="none" stroke="#78350f" strokeWidth="12" strokeLinecap="round" />
    <path d="M 255 475 C 255 458, 285 458, 285 475 Z" fill="#020617" stroke="#1e293b" strokeWidth="2" />
  </g>

  <!-- Arms behind back (boss stance) -->
  <g id="arms-back">
    <path d="M 205 240 C 180 260, 175 300, 190 320" fill="none" stroke="#92400e" strokeWidth="12" strokeLinecap="round" />
    <path d="M 280 235 C 305 250, 305 290, 290 315" fill="none" stroke="#92400e" strokeWidth="12" strokeLinecap="round" />
  </g>

  <!-- Banana Body (Perfect, pristine, tall) -->
  <g id="banana-body">
    <!-- Clean curved tall banana path -->
    <path d="M 270 45 C 235 95, 200 175, 205 290 C 210 365, 235 415, 275 415 C 298 415, 292 355, 282 295 C 272 205, 290 115, 305 45 Z" fill="url(#ceoBananaGrad)" />
    <path d="M 270 45 C 235 95, 200 175, 205 290 C 210 365, 225 395, 235 375 C 215 285, 230 175, 285 45 Z" fill="#92400e" opacity="0.22" />

    <!-- Stem (Clean stem) -->
    <path d="M 270 45 L 305 45 L 295 15 L 275 20 Z" fill="#451a03" />
    <path d="M 275 20 L 295 15 L 292 8 L 278 10 Z" fill="#1c0a00" />

    <!-- Bottom Tip (Perfect dark tip) -->
    <path d="M 268 412 C 274 415, 278 413, 280 409 C 275 402, 265 404, 263 409 Z" fill="#451a03" stroke="#451a03" strokeWidth="3" />
  </g>

  <!-- Elegant Blazer Coat Suit Overlay (Fitted corporate suit) -->
  <g id="blazer-suit">
    <!-- Blazer back/base structure -->
    <path d="M 206 250 C 200 300, 218 360, 236 370 C 260 375, 278 355, 282 320 C 285 290, 280 260, 276 250 Z" fill="url(#blazerGrad)" stroke="#334155" strokeWidth="1.5" />
    
    <!-- White shirt lapels V shape -->
    <polygon points="228,250 252,250 240,295" fill="#f8fafc" />
    
    <!-- Lapels of the suit jacket -->
    <path d="M 210 250 L 226 295 L 235 295 L 224 250 Z" fill="#334155" />
    <path d="M 272 250 L 254 295 L 245 295 L 256 250 Z" fill="#334155" />

    <!-- Gold Premium Tie -->
    <polygon points="236,252 244,252 246,260 234,260" fill="#ca8a04" />
    <polygon points="234,260 246,260 250,305 240,320 230,305" fill="url(#goldGrad)" />

    <!-- Gold Pin on Lapel (Little banana leaf pin) -->
    <circle cx="218" cy="275" r="3.5" fill="#fcd34d" />
    <path d="M 218 275 L 222 272 L 223 277 Z" fill="#fbbf24" />
  </g>

  <!-- Confident Face (Fake corporate smile, calculating squint) -->
  <g id="face" transform="translate(10, 10)">
    <!-- Cheek glow -->
    <ellipse cx="276" cy="215" rx="10" ry="5" fill="#f43f5e" opacity="0.3" />

    <!-- Sharp confident eyes (slanted calculating look) -->
    <!-- Left Eye -->
    <path d="M 210 212 Q 224 200 235 212" fill="none" stroke="#020617" strokeWidth="5.5" strokeLinecap="round" />
    <!-- Right Eye -->
    <path d="M 262 208 Q 276 196 287 208" fill="none" stroke="#020617" strokeWidth="5.5" strokeLinecap="round" />

    <!-- Eyebrows (Arched, confident) -->
    <path d="M 206 196 Q 222 188 234 200" fill="none" stroke="#451a03" strokeWidth="3" strokeLinecap="round" />
    <path d="M 264 192 Q 280 184 292 196" fill="none" stroke="#451a03" strokeWidth="3" strokeLinecap="round" />

    <!-- Wide corporate teeth-baring smile -->
    <path d="M 226 226 C 226 226, 240 255, 272 220 Z" fill="#ffffff" />
    <path d="M 226 226 Q 242 258 272 220" fill="none" stroke="#020617" strokeWidth="4.5" strokeLinecap="round" />
    <line x1="226" y1="226" x2="272" y2="220" stroke="#020617" strokeWidth="4" strokeLinecap="round" />
    <!-- Teeth dividers -->
    <line x1="240" y1="229" x2="242" y2="238" stroke="#020617" strokeWidth="1.5" strokeOpacity="0.3" />
    <line x1="250" y1="227" x2="253" y2="239" stroke="#020617" strokeWidth="1.5" strokeOpacity="0.3" />
    <line x1="260" y1="225" x2="263" y2="232" stroke="#020617" strokeWidth="1.5" strokeOpacity="0.3" />
  </g>
</svg>
