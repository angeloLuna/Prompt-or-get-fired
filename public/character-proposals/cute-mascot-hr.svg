<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="chibiBananaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="35%" stop-color="#fef08a" />
      <stop offset="85%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
    <linearGradient id="tieGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
  </defs>

  <!-- Chubby Legs -->
  <g id="legs">
    <!-- Left Leg -->
    <path d="M 215 375 L 205 440" fill="none" stroke="#ca8a04" strokeWidth="16" strokeLinecap="round" />
    <path d="M 185 440 C 185 425, 215 425, 215 440 Z" fill="#0f172a" stroke="#ca8a04" strokeWidth="2.5" />
    
    <!-- Right Leg -->
    <path d="M 285 375 L 295 440" fill="none" stroke="#ca8a04" strokeWidth="16" strokeLinecap="round" />
    <path d="M 285 440 C 285 425, 315 425, 315 440 Z" fill="#0f172a" stroke="#ca8a04" strokeWidth="2.5" />
  </g>

  <!-- Chubby Banana Body -->
  <g id="banana-body">
    <!-- Stubby curved banana shape -->
    <path d="M 270 100 C 230 140, 190 200, 195 300 C 200 370, 240 400, 290 380 C 320 365, 310 290, 298 230 C 285 170, 295 125, 305 100 Z" fill="url(#chibiBananaGrad)" />
    
    <!-- Body Shadow -->
    <path d="M 270 100 C 230 140, 190 200, 195 300 C 200 370, 220 385, 230 365 C 215 280, 235 180, 285 100 Z" fill="#ca8a04" opacity="0.25" />

    <!-- Stem (Top Brown Tip) -->
    <path d="M 270 100 L 305 100 L 295 70 L 275 75 Z" fill="#78350f" />
    <path d="M 275 75 L 295 70 L 291 62 L 277 64 Z" fill="#451a03" />

    <!-- Bottom Tip -->
    <path d="M 283 381 C 288 383, 290 380, 291 376 C 286 371, 278 373, 276 378 Z" fill="#78350f" stroke="#78350f" strokeWidth="2" />
    
    <!-- Spots -->
    <circle cx="205" cy="220" r="3" fill="#78350f" opacity="0.25" />
    <circle cx="212" cy="290" r="4" fill="#78350f" opacity="0.25" />
    <circle cx="295" cy="320" r="3" fill="#78350f" opacity="0.2" />
  </g>

  <!-- Cute Recruiter Necktie -->
  <g id="tie" transform="translate(10, 5)">
    <!-- Collar strip -->
    <path d="M 226 270 C 235 285, 255 285, 264 270" fill="none" stroke="#7e22ce" strokeWidth="4" />
    <!-- Knot -->
    <polygon points="240,274 250,274 253,282 237,282" fill="#c084fc" />
    <!-- Tie Body -->
    <polygon points="237,282 253,282 258,320 245,332 232,320" fill="url(#tieGrad)" />
  </g>

  <!-- Big Chibi Face (Centered and extra cute) -->
  <g id="face" transform="translate(10, 10)">
    <!-- Cheeks -->
    <circle cx="214" cy="228" r="14" fill="#f43f5e" opacity="0.6" />
    <circle cx="282" cy="226" r="14" fill="#f43f5e" opacity="0.6" />

    <!-- Left Chibi Eye (Shiny and wide open) -->
    <circle cx="218" cy="210" r="16" fill="#0f172a" />
    <!-- Shines -->
    <circle cx="213" cy="204" r="6" fill="#ffffff" />
    <circle cx="224" cy="216" r="3" fill="#ffffff" />

    <!-- Right Chibi Eye (Shiny and wide open) -->
    <circle cx="276" cy="208" r="16" fill="#0f172a" />
    <!-- Shines -->
    <circle cx="271" cy="202" r="6" fill="#ffffff" />
    <circle cx="282" cy="214" r="3" fill="#ffffff" />

    <!-- Small Eyebrows -->
    <path d="M 204 188 Q 218 182 226 192" fill="none" stroke="#78350f" strokeWidth="3" strokeLinecap="round" />
    <path d="M 268 186 Q 282 180 290 190" fill="none" stroke="#78350f" strokeWidth="3" strokeLinecap="round" />

    <!-- Open Happy Recruiter Smile -->
    <path d="M 234 230 C 234 230, 246 256, 260 230 Z" fill="#7f1d1d" />
    <!-- Tongue -->
    <path d="M 241 242 C 245 235, 253 235, 256 242 C 253 248, 243 248, 241 242 Z" fill="#f43f5e" />
    <!-- Mouth outline -->
    <path d="M 234 230 Q 247 257 260 230" fill="none" stroke="#0f172a" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" />
  </g>

  <!-- Hands & Clipboard (Front layers) -->
  <g id="hands-accessories">
    <!-- Left Hand Waving -->
    <path d="M 195 250 Q 165 240 155 210" fill="none" stroke="#eab308" strokeWidth="12" strokeLinecap="round" />
    <circle cx="154" cy="208" r="10" fill="#fef08a" stroke="#ca8a04" strokeWidth="2" />

    <!-- Right Hand holding Clipboard -->
    <path d="M 285 270 Q 320 280 322 300" fill="none" stroke="#eab308" strokeWidth="12" strokeLinecap="round" />
    <circle cx="323" cy="301" r="10" fill="#fef08a" stroke="#ca8a04" strokeWidth="2" />

    <!-- Recruiter's Clipboard -->
    <g id="clipboard" transform="translate(315, 260) rotate(10)">
      <!-- Board -->
      <rect x="0" y="0" width="55" height="75" rx="3" fill="#78350f" stroke="#451a03" strokeWidth="2" />
      <!-- Sheet -->
      <rect x="5" y="10" width="45" height="60" fill="#f8fafc" />
      <!-- Checklist items -->
      <!-- Item 1: Checked -->
      <path d="M 10 22 L 13 25 L 18 19" fill="none" stroke="#10b981" strokeWidth="2" strokeLinecap="round" />
      <line x1="22" y1="22" x2="44" y2="22" stroke="#475569" strokeWidth="2.5" strokeLinecap="round" />
      
      <!-- Item 2: Checked -->
      <path d="M 10 37 L 13 40 L 18 34" fill="none" stroke="#10b981" strokeWidth="2" strokeLinecap="round" />
      <line x1="22" y1="37" x2="40" y2="37" stroke="#475569" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      
      <!-- Item 3: Warning/Cross -->
      <path d="M 10 49 L 16 55 M 16 49 L 10 55" fill="none" stroke="#f43f5e" strokeWidth="2" strokeLinecap="round" />
      <line x1="22" y1="52" x2="38" y2="52" stroke="#94a3b8" strokeWidth="2.5" strokeLinecap="round" strokeOpacity="0.5" />

      <!-- Metallic Clip -->
      <path d="M 18 -4 L 37 -4 L 37 10 L 18 10 Z" fill="#94a3b8" stroke="#475569" strokeWidth="1" />
      <circle cx="27.5" cy="3" r="2.5" fill="#475569" />
    </g>

    <!-- Headset -->
    <g id="headset">
      <ellipse cx="190" cy="216" rx="9" ry="14" fill="#1e293b" transform="rotate(-15, 190, 216)" />
      <ellipse cx="190" cy="216" rx="4.5" ry="7" fill="#10b981" transform="rotate(-15, 190, 216)" />
      <!-- Arch -->
      <path d="M 190 202 C 185 160, 215 110, 252 98" fill="none" stroke="#1e293b" strokeWidth="5.5" strokeLinecap="round" />
      <!-- Mic -->
      <path d="M 190 223 Q 200 243 218 240" fill="none" stroke="#0f172a" strokeWidth="3" strokeLinecap="round" />
      <circle cx="221" cy="239" r="4.5" fill="#f43f5e" />
    </g>
  </g>
</svg>
