<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="fullBananaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe680" />
      <stop offset="60%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <linearGradient id="lanyardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6b21a8" />
    </linearGradient>
  </defs>

  <!-- Limbs & Accessories Behind the Body -->
  <g id="limbs-back">
    <!-- Left Leg (Standing) -->
    <path d="M 220 400 L 210 470 L 195 470" fill="none" stroke="#78350f" strokeWidth="12" strokeLinecap="round" />
    <!-- Left Shoe -->
    <path d="M 185 470 C 185 455, 215 455, 215 470 Z" fill="#0f172a" stroke="#1e293b" strokeWidth="2" />

    <!-- Right Leg (Standing slightly tilted) -->
    <path d="M 270 395 L 285 470 L 305 470" fill="none" stroke="#78350f" strokeWidth="12" strokeLinecap="round" />
    <!-- Right Shoe -->
    <path d="M 285 470 C 285 455, 315 455, 315 470 Z" fill="#0f172a" stroke="#1e293b" strokeWidth="2" />
    
    <!-- Left Arm (Resting on Hip) -->
    <path d="M 205 240 Q 160 260 185 300" fill="none" stroke="#d97706" strokeWidth="12" strokeLinecap="round" />
  </g>

  <!-- Main Banana Body -->
  <g id="banana-body">
    <!-- Curved Banana Shape -->
    <path d="M 270 50 C 240 100, 205 180, 210 290 C 215 360, 240 410, 275 410 C 295 410, 290 350, 280 290 C 270 200, 290 110, 305 50 Z" fill="url(#fullBananaGrad)" />
    
    <!-- Shadow Side -->
    <path d="M 270 50 C 240 100, 205 180, 210 290 C 215 360, 230 390, 240 370 C 220 280, 235 180, 285 50 Z" fill="#b45309" opacity="0.25" />

    <!-- Stem (Top Brown Tip) -->
    <path d="M 270 50 L 305 50 L 295 20 L 275 25 Z" fill="#78350f" />
    <path d="M 275 25 L 295 20 L 292 12 L 278 14 Z" fill="#451a03" />

    <!-- Bottom Tip -->
    <path d="M 268 408 C 274 411, 278 409, 280 405 C 275 398, 265 400, 263 405 Z" fill="#78350f" stroke="#78350f" strokeWidth="4" />

    <!-- Ripe Spots -->
    <circle cx="218" cy="180" r="3" fill="#78350f" opacity="0.3" />
    <circle cx="225" cy="270" r="4.5" fill="#78350f" opacity="0.3" />
    <circle cx="276" cy="350" r="3.5" fill="#78350f" opacity="0.3" />
    <circle cx="288" cy="130" r="4" fill="#78350f" opacity="0.2" />
  </g>

  <!-- Face details (centered directly on the body) -->
  <g id="face" transform="translate(10, 5)">
    <!-- Rosy Cheeks -->
    <ellipse cx="222" cy="225" rx="12" ry="7" fill="#f43f5e" opacity="0.5" />
    <ellipse cx="276" cy="220" rx="12" ry="7" fill="#f43f5e" opacity="0.5" />

    <!-- Eyes (recruiter squint) -->
    <path d="M 210 216 Q 222 204 232 216" fill="none" stroke="#0f172a" strokeWidth="5" strokeLinecap="round" />
    <path d="M 264 211 Q 276 199 286 211" fill="none" stroke="#0f172a" strokeWidth="5" strokeLinecap="round" />

    <!-- Eyebrows -->
    <path d="M 206 202 Q 220 193 232 204" fill="none" stroke="#78350f" strokeWidth="2.5" strokeLinecap="round" />
    <path d="M 266 197 Q 280 188 292 199" fill="none" stroke="#78350f" strokeWidth="2.5" strokeLinecap="round" />

    <!-- Smiling Mouth -->
    <path d="M 230 230 Q 250 258 268 227" fill="none" stroke="#0f172a" strokeWidth="4.5" strokeLinecap="round" />
    <!-- Cheerful Creases -->
    <path d="M 227 228 Q 229 231 232 229" fill="none" stroke="#0f172a" strokeWidth="3" strokeLinecap="round" />
    <path d="M 271 224 Q 269 227 266 225" fill="none" stroke="#0f172a" strokeWidth="3" strokeLinecap="round" />
  </g>

  <!-- Limbs & Accessories in Front -->
  <g id="limbs-front">
    <!-- Right Arm Waving -->
    <path d="M 276 235 Q 330 200 330 150" fill="none" stroke="#d97706" strokeWidth="12" strokeLinecap="round" />
    <!-- Glove/Hand (Waving) -->
    <circle cx="330" cy="150" r="14" fill="#ffe680" stroke="#b45309" strokeWidth="2" />
    <circle cx="322" cy="142" r="5" fill="#ffe680" stroke="#b45309" strokeWidth="2" />

    <!-- Headset -->
    <g id="headset">
      <ellipse cx="204" cy="225" rx="10" ry="15" fill="#1e293b" transform="rotate(-10, 204, 225)" />
      <ellipse cx="204" cy="225" rx="5" ry="8" fill="#10b981" transform="rotate(-10, 204, 225)" />
      <!-- Arch -->
      <path d="M 204 210 C 200 170, 225 125, 258 112" fill="none" stroke="#1e293b" strokeWidth="5.5" strokeLinecap="round" />
      <!-- Mic -->
      <path d="M 204 232 Q 215 252 232 248" fill="none" stroke="#0f172a" strokeWidth="3" strokeLinecap="round" />
      <circle cx="235" cy="247" r="4.5" fill="#f43f5e" />
    </g>

    <!-- HR Lanyard and Card -->
    <g id="lanyard" transform="translate(10, 10)">
      <!-- Loop around Neck -->
      <path d="M 215 270 Q 245 305 272 265" fill="none" stroke="url(#lanyardGrad)" strokeWidth="5" />
      <!-- Badge Badge Holder -->
      <rect x="232" y="295" width="28" height="38" rx="3" fill="#1e293b" stroke="#ec4899" strokeWidth="1.5" />
      <rect x="236" y="298" width="8" height="10" fill="#fcd34d" />
      <line x1="247" y1="300" x2="256" y2="300" stroke="#ffffff" strokeWidth="1.5" />
      <line x1="247" y1="304" x2="253" y2="304" stroke="#ffffff" strokeWidth="1.5" strokeOpacity="0.5" />
      <rect x="236" y="318" width="20" height="11" fill="#10b981" rx="1.5" />
      <text x="246" y="326" fill="#ffffff" fontSize="7" fontWeight="bold" fontFamily="monospace" text-anchor="middle">HR</text>
    </g>
  </g>
</svg>
