<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="managerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="60%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#854d0e" />
    </linearGradient>
    <linearGradient id="tieGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b91c1c" />
      <stop offset="100%" stop-color="#7f1d1d" />
    </linearGradient>
  </defs>

  <!-- Legs and Shoes -->
  <g id="legs">
    <!-- Left Leg -->
    <path d="M 220 400 L 210 470 L 195 470" fill="none" stroke="#78350f" strokeWidth="12" strokeLinecap="round" />
    <path d="M 185 470 C 185 455, 215 455, 215 470 Z" fill="#0f172a" stroke="#1e293b" strokeWidth="2" />

    <!-- Right Leg -->
    <path d="M 270 395 L 285 470 L 305 470" fill="none" stroke="#78350f" strokeWidth="12" strokeLinecap="round" />
    <path d="M 285 470 C 285 455, 315 455, 315 470 Z" fill="#0f172a" stroke="#1e293b" strokeWidth="2" />
  </g>

  <!-- Banana Body (Slightly wider / more mature) -->
  <g id="banana-body">
    <!-- Curved banana path, slightly chubbier than standard -->
    <path d="M 275 50 C 240 100, 200 170, 205 290 C 210 360, 235 410, 275 410 C 300 410, 295 350, 285 290 C 275 200, 292 110, 310 50 Z" fill="url(#managerGrad)" />
    <path d="M 275 50 C 240 100, 200 170, 205 290 C 210 360, 225 390, 235 370 C 215 280, 230 170, 290 50 Z" fill="#854d0e" opacity="0.3" />
    
    <!-- Stem -->
    <path d="M 275 50 L 310 50 L 300 20 L 280 25 Z" fill="#451a03" />
    <path d="M 280 25 L 300 20 L 297 12 L 283 14 Z" fill="#270b00" />
    
    <!-- Bottom Tip -->
    <path d="M 268 408 C 274 411, 278 409, 280 405 C 275 398, 265 400, 263 405 Z" fill="#451a03" stroke="#451a03" strokeWidth="4" />

    <!-- Highly visible brown ripe spots (showing maturity/exigency) -->
    <circle cx="218" cy="180" r="5" fill="#451a03" opacity="0.6" />
    <circle cx="212" cy="183" r="3.5" fill="#451a03" opacity="0.5" />
    <circle cx="215" cy="270" r="6" fill="#451a03" opacity="0.6" />
    <circle cx="270" cy="340" r="5" fill="#451a03" opacity="0.5" />
    <circle cx="282" cy="344" r="3" fill="#451a03" opacity="0.4" />
    <circle cx="285" cy="140" r="5.5" fill="#451a03" opacity="0.5" />
  </g>

  <!-- Left Arm (Resting on Hip in authoritarian pose) -->
  <g id="left-arm">
    <path d="M 202 245 Q 160 265 180 305" fill="none" stroke="#d97706" strokeWidth="12" strokeLinecap="round" />
  </g>

  <!-- Necktie Accessory -->
  <g id="tie" transform="translate(15, 20)">
    <!-- Collar -->
    <path d="M 220 250 C 230 262, 245 262, 252 250" fill="none" stroke="#ffffff" strokeWidth="5" />
    <!-- Red tie -->
    <polygon points="232,254 242,254 245,260 230,260" fill="#f87171" />
    <polygon points="230,260 245,260 248,310 237,325 226,310" fill="url(#tieGrad)" />
    <!-- Tie pattern (Stripes) -->
    <line x1="232" y1="272" x2="242" y2="267" stroke="#f87171" strokeWidth="2.5" />
    <line x1="235" y1="290" x2="245" y2="285" stroke="#f87171" strokeWidth="2.5" />
    <line x1="238" y1="308" x2="247" y2="303" stroke="#f87171" strokeWidth="2.5" />
  </g>

  <!-- Face details (Smug, glasses, raised eyebrow) -->
  <g id="face" transform="translate(10, 10)">
    <!-- Rosy Cheek (Right only, smug grin) -->
    <ellipse cx="276" cy="215" rx="10" ry="5" fill="#f43f5e" opacity="0.4" />

    <!-- Smug smirk mouth -->
    <path d="M 230 226 Q 255 238 270 218" fill="none" stroke="#0f172a" strokeWidth="4.5" strokeLinecap="round" />
    <path d="M 227 225 L 233 228" fill="none" stroke="#0f172a" strokeWidth="4" strokeLinecap="round" />

    <!-- Raised Left Eyebrow (Exigente) -->
    <path d="M 200 188 Q 220 170 235 188" fill="none" stroke="#451a03" strokeWidth="4" strokeLinecap="round" />
    <!-- Lowered Right Eyebrow (Smug/Serious) -->
    <path d="M 258 190 Q 275 192 288 180" fill="none" stroke="#451a03" strokeWidth="4" strokeLinecap="round" />

    <!-- Square glasses -->
    <g id="glasses">
      <!-- Left frame -->
      <rect x="195" y="194" width="38" height="26" rx="3" fill="rgba(15, 23, 42, 0.25)" stroke="#0f172a" strokeWidth="4.5" />
      <path d="M 197 197 L 210 205" fill="none" stroke="#ffffff" strokeWidth="1.5" strokeLinecap="round" strokeOpacity="0.6" />
      <!-- Right frame -->
      <rect x="250" y="190" width="38" height="26" rx="3" fill="rgba(15, 23, 42, 0.25)" stroke="#0f172a" strokeWidth="4.5" />
      <path d="M 252 193 L 265 201" fill="none" stroke="#ffffff" strokeWidth="1.5" strokeLinecap="round" strokeOpacity="0.6" />
      <!-- Bridge -->
      <line x1="233" y1="205" x2="250" y2="203" stroke="#0f172a" strokeWidth="4.5" />
      <!-- Temple connections -->
      <line x1="195" y1="205" x2="188" y2="207" stroke="#0f172a" strokeWidth="4.5" />
      <line x1="288" y1="200" x2="295" y2="198" stroke="#0f172a" strokeWidth="4.5" />
    </g>
  </g>

  <!-- Right Arm holding Coffee Mug -->
  <g id="mug-arm">
    <!-- Arm -->
    <path d="M 276 245 Q 325 260 320 295" fill="none" stroke="#d97706" strokeWidth="12" strokeLinecap="round" />
    <!-- Hand -->
    <circle cx="320" cy="296" r="10" fill="#ffe680" stroke="#b45309" strokeWidth="1.5" />
    
    <!-- Red Mug -->
    <g id="coffee-mug" transform="translate(315, 280)">
      <!-- Handle -->
      <path d="M 24 10 C 35 10, 35 25, 24 25" fill="none" stroke="#dc2626" strokeWidth="6.5" />
      <!-- Body -->
      <rect x="0" y="3" width="26" height="30" rx="3" fill="#dc2626" />
      <!-- Steam vapor -->
      <path d="M 5 -6 Q 2 -12, 6 -18" fill="none" stroke="#94a3b8" strokeWidth="2.5" strokeLinecap="round" strokeOpacity="0.5" />
      <path d="M 14 -8 Q 18 -14, 13 -20" fill="none" stroke="#94a3b8" strokeWidth="2.5" strokeLinecap="round" strokeOpacity="0.5" />
    </g>
  </g>
</svg>
