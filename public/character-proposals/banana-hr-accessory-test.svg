<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bananaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe680" />
      <stop offset="60%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <linearGradient id="lanyardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
  </defs>

  <!-- Legs and Back Limb -->
  <g id="limbs-back">
    <!-- Left Leg -->
    <path d="M 220 400 L 210 470 L 195 470" fill="none" stroke="#78350f" strokeWidth="12" strokeLinecap="round" />
    <path d="M 185 470 C 185 455, 215 455, 215 470 Z" fill="#0f172a" stroke="#1e293b" strokeWidth="2" />

    <!-- Right Leg -->
    <path d="M 270 395 L 285 470 L 305 470" fill="none" stroke="#78350f" strokeWidth="12" strokeLinecap="round" />
    <path d="M 285 470 C 285 455, 315 455, 315 470 Z" fill="#0f172a" stroke="#1e293b" strokeWidth="2" />
  </g>

  <!-- Banana Body -->
  <g id="banana-body">
    <path d="M 270 50 C 240 100, 205 180, 210 290 C 215 360, 240 410, 275 410 C 295 410, 290 350, 280 290 C 270 200, 290 110, 305 50 Z" fill="url(#bananaGrad)" />
    <path d="M 270 50 C 240 100, 205 180, 210 290 C 215 360, 230 390, 240 370 C 220 280, 235 180, 285 50 Z" fill="#b45309" opacity="0.25" />
    <!-- Stem -->
    <path d="M 270 50 L 305 50 L 295 20 L 275 25 Z" fill="#78350f" />
    <path d="M 275 25 L 295 20 L 292 12 L 278 14 Z" fill="#451a03" />
    <!-- Bottom tip -->
    <path d="M 268 408 C 274 411, 278 409, 280 405 C 275 398, 265 400, 263 405 Z" fill="#78350f" stroke="#78350f" strokeWidth="4" />
  </g>

  <!-- Recruiter Face -->
  <g id="face" transform="translate(10, 5)">
    <ellipse cx="222" cy="225" rx="12" ry="7" fill="#f43f5e" opacity="0.5" />
    <ellipse cx="276" cy="220" rx="12" ry="7" fill="#f43f5e" opacity="0.5" />
    <!-- Smile and Squint eyes -->
    <path d="M 210 216 Q 222 204 232 216" fill="none" stroke="#0f172a" strokeWidth="5.5" strokeLinecap="round" />
    <path d="M 264 211 Q 276 199 286 211" fill="none" stroke="#0f172a" strokeWidth="5.5" strokeLinecap="round" />
    <path d="M 206 202 Q 220 193 232 204" fill="none" stroke="#78350f" strokeWidth="2.5" strokeLinecap="round" />
    <path d="M 266 197 Q 280 188 292 199" fill="none" stroke="#78350f" strokeWidth="2.5" strokeLinecap="round" />
    <path d="M 228 230 Q 250 258 268 227" fill="none" stroke="#0f172a" strokeWidth="4.5" strokeLinecap="round" />
  </g>

  <!-- Headset -->
  <g id="headset">
    <ellipse cx="204" cy="225" rx="10" ry="15" fill="#1e293b" transform="rotate(-10, 204, 225)" />
    <ellipse cx="204" cy="225" rx="5" ry="8" fill="#10b981" transform="rotate(-10, 204, 225)" />
    <path d="M 204 210 C 200 170, 225 125, 258 112" fill="none" stroke="#1e293b" strokeWidth="5" strokeLinecap="round" />
    <path d="M 204 232 Q 215 252 232 248" fill="none" stroke="#0f172a" strokeWidth="3" strokeLinecap="round" />
    <circle cx="235" cy="247" r="4" fill="#f43f5e" />
  </g>

  <!-- Lanyard / Badge -->
  <g id="lanyard" transform="translate(10, 10)">
    <path d="M 215 270 Q 245 305 272 265" fill="none" stroke="url(#lanyardGrad)" strokeWidth="5" />
    <!-- HR Badge Card -->
    <rect x="232" y="295" width="28" height="38" rx="3" fill="#1e293b" stroke="#8b5cf6" strokeWidth="1.5" />
    <rect x="236" y="298" width="8" height="10" fill="#fcd34d" />
    <line x1="247" y1="300" x2="256" y2="300" stroke="#ffffff" strokeWidth="1.5" />
    <line x1="247" y1="304" x2="253" y2="304" stroke="#ffffff" strokeWidth="1.5" strokeOpacity="0.5" />
    <rect x="236" y="318" width="20" height="11" fill="#10b981" rx="1.5" />
    <text x="246" y="326" fill="#ffffff" fontSize="7" fontWeight="bold" fontFamily="monospace" text-anchor="middle">HR</text>
  </g>

  <!-- Front Arm holding Clipboard -->
  <g id="front-arm-clipboard">
    <!-- Arm -->
    <path d="M 280 240 Q 325 255 330 280" fill="none" stroke="#d97706" strokeWidth="12" strokeLinecap="round" />
    <!-- Hand -->
    <circle cx="330" cy="281" r="10" fill="#ffe680" stroke="#b45309" strokeWidth="1.5" />
    
    <!-- Recruiter Clipboard -->
    <g id="clipboard" transform="translate(325, 240) rotate(5)">
      <!-- Board -->
      <rect x="0" y="0" width="50" height="70" rx="3" fill="#78350f" stroke="#451a03" strokeWidth="2" />
      <!-- Sheet -->
      <rect x="4" y="8" width="42" height="56" fill="#f8fafc" />
      <!-- Lines -->
      <path d="M 8 18 L 11 21 L 16 15" fill="none" stroke="#10b981" strokeWidth="1.8" strokeLinecap="round" />
      <line x1="20" y1="18" x2="40" y2="18" stroke="#475569" strokeWidth="2" />
      
      <path d="M 8 30 L 11 33 L 16 27" fill="none" stroke="#10b981" strokeWidth="1.8" strokeLinecap="round" />
      <line x1="20" y1="30" x2="38" y2="30" stroke="#475569" strokeWidth="2" />
      
      <path d="M 8 42 L 11 45 L 16 39" fill="none" stroke="#10b981" strokeWidth="1.8" strokeLinecap="round" />
      <line x1="20" y1="42" x2="36" y2="42" stroke="#475569" strokeWidth="2" />
      
      <!-- Clip -->
      <rect x="18" y="-4" width="14" height="12" fill="#94a3b8" stroke="#475569" strokeWidth="1" />
      <circle cx="25" cy="2" r="1.5" fill="#475569" />
    </g>
  </g>

  <!-- Left Arm on Hip -->
  <g id="left-arm">
    <path d="M 205 240 Q 165 260 185 295" fill="none" stroke="#d97706" strokeWidth="12" strokeLinecap="round" />
  </g>
</svg>
