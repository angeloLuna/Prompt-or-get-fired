<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%">
  <!-- Definitions for gradients -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17" />
      <stop offset="100%" stop-color="#04060b" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.5" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Base Dark Background -->
  <rect width="1440" height="900" fill="url(#bgGrad)" />

  <!-- Center Spotlight Glow for character readability -->
  <circle cx="720" cy="450" r="500" fill="url(#centerGlow)" />

  <!-- Grid Pattern (Overlay) -->
  <path d="M 0 0 L 1440 0 M 0 90 L 1440 90 M 0 180 L 1440 180 M 0 270 L 1440 270 M 0 360 L 1440 360 M 0 450 L 1440 450 M 0 540 L 1440 540 M 0 630 L 1440 630 M 0 720 L 1440 720 M 0 810 L 1440 810" fill="none" stroke="rgba(139, 92, 246, 0.03)" strokeWidth="1" />
  <path d="M 0 0 L 0 900 M 144 0 L 144 900 M 288 0 L 288 900 M 432 0 L 432 900 M 576 0 L 576 900 M 720 0 L 720 900 M 864 0 L 864 900 M 1008 0 L 1008 900 M 1152 0 L 1152 900 M 1296 0 L 1296 900" fill="none" stroke="rgba(139, 92, 246, 0.03)" strokeWidth="1" />

  <!-- Decorative light lines -->
  <path d="M -100 100 L 400 300" fill="none" stroke="#8b5cf6" strokeWidth="2" opacity="0.1" />
  <path d="M 1000 700 L 1500 800" fill="none" stroke="#10b981" strokeWidth="2" opacity="0.1" />

  <!-- LEFT SIDE: Floating HR Dashboards / Checklists -->
  <g id="left-dashboard" transform="translate(80, 150)">
    <!-- Main HR Glass Card -->
    <rect x="0" y="0" width="320" height="420" rx="16" fill="url(#panelGrad)" stroke="rgba(139, 92, 246, 0.2)" strokeWidth="1.5" />
    <rect x="0" y="0" width="320" height="420" rx="16" fill="none" stroke="rgba(16, 185, 129, 0.15)" strokeWidth="1" />

    <!-- Card Header -->
    <text x="25" y="40" fill="#10b981" fontSize="14" fontFamily="monospace" fontWeight="bold" letter-spacing="1">CANDIDATE_ONBOARDING</text>
    <line x1="25" y1="55" x2="295" y2="55" stroke="rgba(139, 92, 246, 0.2)" strokeWidth="1.5" />

    <!-- Checklist Item 1 -->
    <g transform="translate(25, 80)">
      <!-- Checkbox (Checked) -->
      <rect x="0" y="0" width="18" height="18" rx="4" fill="rgba(16, 185, 129, 0.2)" stroke="#10b981" strokeWidth="1.5" />
      <path d="M 4 9 L 8 13 L 14 5" fill="none" stroke="#10b981" strokeWidth="2" strokeLinecap="round" />
      <text x="32" y="14" fill="#dfe2ef" fontSize="12" fontFamily="sans-serif">Bases de Prompting</text>
      <text x="240" y="14" fill="#10b981" fontSize="10" fontFamily="monospace">DONE</text>
    </g>

    <!-- Checklist Item 2 -->
    <g transform="translate(25, 130)">
      <!-- Checkbox (Checked) -->
      <rect x="0" y="0" width="18" height="18" rx="4" fill="rgba(16, 185, 129, 0.2)" stroke="#10b981" strokeWidth="1.5" />
      <path d="M 4 9 L 8 13 L 14 5" fill="none" stroke="#10b981" strokeWidth="2" strokeLinecap="round" />
      <text x="32" y="14" fill="#dfe2ef" fontSize="12" fontFamily="sans-serif"> Grounding y Restricciones</text>
      <text x="240" y="14" fill="#10b981" fontSize="10" fontFamily="monospace">DONE</text>
    </g>

    <!-- Checklist Item 3 -->
    <g transform="translate(25, 180)">
      <!-- Checkbox (Unchecked, active warning) -->
      <rect x="0" y="0" width="18" height="18" rx="4" fill="rgba(139, 92, 246, 0.1)" stroke="#8b5cf6" strokeWidth="1.5" />
      <text x="32" y="14" fill="#dfe2ef" fontSize="12" fontFamily="sans-serif">Evaluación en Staging</text>
      <text x="220" y="14" fill="#8b5cf6" fontSize="10" fontFamily="monospace" className="animate-pulse">PENDING</text>
    </g>

    <!-- Checklist Item 4 -->
    <g transform="translate(25, 230)">
      <!-- Checkbox (Unchecked, error/risk) -->
      <rect x="0" y="0" width="18" height="18" rx="4" fill="rgba(244, 63, 94, 0.05)" stroke="rgba(244, 63, 94, 0.4)" strokeWidth="1.5" />
      <text x="32" y="14" fill="#64748b" fontSize="12" fontFamily="sans-serif">Mitigación de Inyecciones</text>
      <text x="235" y="14" fill="#f43f5e" fontSize="10" fontFamily="monospace" opacity="0.6">LOCKED</text>
    </g>

    <!-- HR Stats Radar/Briefing -->
    <g transform="translate(25, 280)">
      <rect x="0" y="0" width="270" height="110" rx="8" fill="rgba(15, 23, 42, 0.4)" stroke="rgba(139, 92, 246, 0.1)" strokeWidth="1" />
      <text x="15" y="25" fill="#64748b" fontSize="10" fontFamily="monospace">HR_RISK_INDEX</text>
      <text x="15" y="45" fill="#f43f5e" fontSize="18" fontFamily="monospace" fontWeight="bold">0% SAFE</text>
      <text x="15" y="65" fill="#64748b" fontSize="9" fontFamily="sans-serif">Sujeto a evaluación constante de comportamiento corporativo.</text>
      
      <!-- Mini graph bar -->
      <rect x="15" y="85" width="240" height="8" rx="4" fill="rgba(255,255,255,0.05)" />
      <rect x="15" y="85" width="80" height="8" rx="4" fill="#8b5cf6" />
    </g>
  </g>

  <!-- RIGHT SIDE: Candidate Profiles & Metrics -->
  <g id="right-dashboard" transform="translate(1040, 200)">
    <!-- Candidate Card -->
    <rect x="0" y="0" width="320" height="320" rx="16" fill="url(#panelGrad)" stroke="rgba(139, 92, 246, 0.2)" strokeWidth="1.5" />
    <rect x="0" y="0" width="320" height="320" rx="16" fill="none" stroke="rgba(16, 185, 129, 0.15)" strokeWidth="1" />

    <text x="25" y="40" fill="#8b5cf6" fontSize="14" fontFamily="monospace" fontWeight="bold" letter-spacing="1">INTERVIEW_STATUS</text>
    <line x1="25" y1="55" x2="295" y2="55" stroke="rgba(139, 92, 246, 0.2)" strokeWidth="1.5" />

    <!-- Avatar frame placeholder -->
    <rect x="25" y="80" width="60" height="60" rx="8" fill="rgba(15, 23, 42, 0.6)" stroke="rgba(139, 92, 246, 0.2)" strokeWidth="1" />
    <!-- Chibi banana graphic outline inside photo -->
    <path d="M 50 95 C 45 105, 52 125, 60 120" fill="none" stroke="#fcd34d" strokeWidth="4" strokeLinecap="round" />
    <circle cx="55" cy="100" r="1.5" fill="#000000" />

    <text x="100" y="98" fill="#ffffff" fontSize="12" fontFamily="sans-serif" fontWeight="bold">Junior AI Intern</text>
    <text x="100" y="115" fill="#64748b" fontSize="10" fontFamily="monospace">ID: #4092-B</text>
    <text x="100" y="132" fill="#10b981" fontSize="10" fontFamily="monospace">REPUTATION: 50%</text>

    <!-- Terminal logs -->
    <g transform="translate(25, 160)">
      <rect x="0" y="0" width="270" height="135" rx="8" fill="#090d16" stroke="rgba(139, 92, 246, 0.1)" strokeWidth="1" />
      <text x="15" y="25" fill="#10b981" fontSize="10" fontFamily="monospace">&gt; HELGA_SYSTEM_BOOT: OK</text>
      <text x="15" y="45" fill="#8b5cf6" fontSize="10" fontFamily="monospace">&gt; STATUS: Analyzing profile...</text>
      <text x="15" y="65" fill="#dfe2ef" fontSize="10" fontFamily="monospace">&gt; AI_SKILL: 0% (Junior level)</text>
      <text x="15" y="85" fill="#f43f5e" fontSize="10" fontFamily="monospace">&gt; WARNING: High risk of firing</text>
      <text x="15" y="105" fill="#64748b" fontSize="10" fontFamily="monospace">&gt; System instructions: Active.</text>
      
      <!-- Small pulsing cursor -->
      <rect x="185" y="97" width="6" height="10" fill="#10b981" opacity="0.8" className="animate-pulse" />
    </g>
  </g>
</svg>
