<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e071b" />
      <stop offset="100%" stop-color="#04020a" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#7e22ce" stop-opacity="0.1" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#fcd34d" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Base Dark Background -->
  <rect width="1440" height="900" fill="url(#bgGrad)" />

  <!-- Penthouse window grids / Glass panels in background -->
  <rect x="0" y="50" width="1440" height="600" fill="url(#glassGrad)" stroke="rgba(252, 211, 77, 0.05)" strokeWidth="2" />
  
  <!-- Skyscrapers Cityscape outside the window (Geometric paths with lights) -->
  <g id="cityscape" opacity="0.4" transform="translate(0, 150)">
    <!-- Tower 1 Left -->
    <rect x="120" y="100" width="110" height="400" fill="#1e1b4b" stroke="rgba(252, 211, 77, 0.1)" />
    <circle cx="150" cy="150" r="2" fill="#fcd34d" />
    <circle cx="180" cy="150" r="2" fill="#fcd34d" />
    <circle cx="210" cy="150" r="2" fill="#fcd34d" opacity="0.3" />
    <circle cx="150" cy="200" r="2" fill="#fcd34d" />
    <circle cx="180" cy="200" r="2" fill="#fcd34d" opacity="0.4" />
    <circle cx="210" cy="200" r="2" fill="#fcd34d" />

    <!-- Tower 2 Left Center -->
    <rect x="290" y="220" width="90" height="280" fill="#0f172a" />
    <polygon points="290,220 335,170 380,220" fill="#1e1b4b" />
    <line x1="335" y1="170" x2="335" y2="500" stroke="#fcd34d" strokeWidth="1" opacity="0.3" />

    <!-- Tower 3 Right Center -->
    <rect x="1020" y="150" width="120" height="350" fill="#1e1b4b" stroke="rgba(139, 92, 246, 0.1)" />
    <circle cx="1050" cy="220" r="2.5" fill="#a855f7" />
    <circle cx="1080" cy="220" r="2.5" fill="#a855f7" />
    <circle cx="1110" cy="220" r="2.5" fill="#a855f7" />
    <circle cx="1050" cy="280" r="2.5" fill="#a855f7" opacity="0.5" />
    <circle cx="1080" cy="280" r="2.5" fill="#a855f7" />
    <circle cx="1110" cy="280" r="2.5" fill="#a855f7" />

    <!-- Tower 4 Right Far -->
    <rect x="1200" y="80" width="130" height="420" fill="#0f172a" stroke="rgba(252, 211, 77, 0.1)" />
    <line x1="1265" y1="80" x2="1265" y2="500" stroke="#fbbf24" strokeWidth="1.5" opacity="0.4" />
  </g>

  <!-- Golden Center Spotlight Glow -->
  <circle cx="720" cy="450" r="500" fill="url(#centerGlow)" />

  <!-- Penthouse Pillars / Window frames (Sleek dark architecture) -->
  <!-- Left Pillar -->
  <rect x="40" y="0" width="60" height="900" fill="#090514" stroke="rgba(252, 211, 77, 0.1)" strokeWidth="1.5" />
  <line x1="70" y1="0" x2="70" y2="900" stroke="#fbbf24" strokeWidth="1" opacity="0.25" />

  <!-- Right Pillar -->
  <rect x="1340" y="0" width="60" height="900" fill="#090514" stroke="rgba(252, 211, 77, 0.1)" strokeWidth="1.5" />
  <line x1="1370" y1="0" x2="1370" y2="900" stroke="#fbbf24" strokeWidth="1" opacity="0.25" />

  <!-- Top Frame Beam -->
  <rect x="0" y="0" width="1440" height="95" fill="#090514" stroke="rgba(252, 211, 77, 0.1)" strokeWidth="1.5" />
  <line x1="0" y1="75" x2="1440" y2="75" stroke="#fbbf24" strokeWidth="1.5" opacity="0.3" />

  <!-- Elegant Golden accent lights floating -->
  <circle cx="200" cy="40" r="3" fill="#fbbf24" />
  <circle cx="350" cy="40" r="3" fill="#fbbf24" />
  <circle cx="500" cy="40" r="3" fill="#fbbf24" />
  <circle cx="650" cy="40" r="3" fill="#fbbf24" />
  <circle cx="800" cy="40" r="3" fill="#fbbf24" />
  <circle cx="950" cy="40" r="3" fill="#fbbf24" />
  <circle cx="1100" cy="40" r="3" fill="#fbbf24" />
  <circle cx="1250" cy="40" r="3" fill="#fbbf24" />

  <!-- Executive Desk Hints (at bottom left/right corners) -->
  <!-- Left desk corner -->
  <path d="M 0 780 L 320 830 L 320 900 L 0 900 Z" fill="#020105" stroke="rgba(252, 211, 77, 0.15)" strokeWidth="2.5" />
  <!-- Minimalist gold light strip on desk -->
  <line x1="0" y1="785" x2="310" y2="833" stroke="#fbbf24" strokeWidth="2.5" opacity="0.5" />

  <!-- Right desk corner -->
  <path d="M 1440 780 L 1120 830 L 1120 900 L 1440 900 Z" fill="#020105" stroke="rgba(252, 211, 77, 0.15)" strokeWidth="2.5" />
  <line x1="1440" y1="785" x2="1130" y2="833" stroke="#fbbf24" strokeWidth="2.5" opacity="0.5" />

  <!-- CEO Logo hologram placeholder (Center Top) -->
  <g id="hologram-logo" transform="translate(720, 160)" opacity="0.6">
    <ellipse cx="0" cy="0" rx="35" ry="8" fill="none" stroke="#fcd34d" strokeWidth="1" strokeDasharray="3,3" />
    <path d="M -15 -10 L 15 -10 L 20 15 L 0 25 L -20 15 Z" fill="none" stroke="#fbbf24" strokeWidth="1.5" />
    <text x="0" y="5" fill="#fcd34d" fontSize="6" fontFamily="monospace" fontWeight="bold" text-anchor="middle">BANANO_CORP</text>
  </g>
</svg>
